<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KHEDMA — طنجة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <span class="logo">KHEDMA</span>
    <nav class="lang-toggle" aria-label="Language switcher">
      <button class="lang-btn" data-lang="ar">AR</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="fr">FR</button>
      <button class="lang-btn" data-lang="es">ES</button>
      <button class="lang-btn" data-lang="darija">درجة</button>
    </nav>
  </header>

  <!-- Hero -->
  <div class="hero">
    <h1>KHEDMA</h1>
    <p data-i18n="tagline">خدمة قريبة منك في طنجة</p>
  </div>

  <!-- Stats -->
  <div class="page-wrap mt-12 mb-16">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-value" id="stat-jobs">—</div>
        <div class="stat-label" data-i18n="jobsActive">وظيفة نشطة</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-workers">—</div>
        <div class="stat-label" data-i18n="workersActive">عامل متاح</div>
      </div>
    </div>
  </div>

  <!-- Search -->
  <div class="page-wrap mb-12">
    <div class="search-wrap">
      <i class="fas fa-search search-icon"></i>
      <input
        type="search"
        class="search-input"
        id="search-input"
        data-i18n-ph="search"
        placeholder="ابحث عن وظيفة..."
        oninput="handleSearch(this.value)"
        autocomplete="off"
      >
    </div>
  </div>

  <!-- Category filter chips -->
  <div class="filter-bar mb-16" id="cat-filter-bar">
    <span class="chip cat-chip active" data-cat="all" onclick="setCategory('all',this)" data-i18n="allCategories">الكل</span>
  </div>

  <!-- Jobs list -->
  <div class="page-wrap">
    <div id="jobs-list" class="list"></div>
  </div>

  <!-- FAB: post a job -->
  <a href="post-job.html" class="fab">
    <i class="fas fa-plus"></i>
    <span data-i18n="postJob">نشر وظيفة</span>
  </a>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a class="nav-item active" href="index.html">
      <i class="fas fa-briefcase"></i>
      <span data-i18n="browseJobs">الوظائف</span>
    </a>
    <a class="nav-item" href="workers.html">
      <i class="fas fa-users"></i>
      <span data-i18n="workers">العمال</span>
    </a>
    <a class="nav-item" href="post-job.html">
      <i class="fas fa-plus-circle"></i>
      <span data-i18n="postJob">نشر</span>
    </a>
  </nav>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/shared.js"></script>
  <script src="js/jobs.js"></script>
  <script>
    /* Inject category chips from CONFIG */
    document.addEventListener('DOMContentLoaded', () => {
      const bar = document.getElementById('cat-filter-bar');
      CONFIG.CATEGORIES.forEach(c => {
        const chip = document.createElement('span');
        chip.className = 'chip cat-chip';
        chip.dataset.cat = c.id;
        chip.textContent = `${c.icon} ${c[currentLang] || c.ar}`;
        chip.onclick = function() { setCategory(c.id, this); };
        bar.appendChild(chip);
      });

      /* Check onboarding */
      if (!localStorage.getItem('khedma_onboarded')) {
        window.location.href = 'onboarding.html';
        return;
      }

      loadJobs();
      subscribeRealtime();
    });
  </script>
</body>
</html>
